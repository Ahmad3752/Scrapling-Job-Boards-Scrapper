name: Daily Job Scrape

on:
  schedule:
    - cron: '0 20 * * *'   # 1am PKT — LinkedIn, Role Set 1
    - cron: '0 23 * * *'   # 4am PKT — Indeed, Role Set 1
    - cron: '0 2 * * *'    # 7am PKT — LinkedIn, Role Set 2
    - cron: '0 5 * * *'    # 10am PKT — Indeed, Role Set 2
    - cron: '0 8 * * *'    # 1pm PKT — LinkedIn, Role Set 1
    - cron: '0 11 * * *'   # 4pm PKT — Indeed, Role Set 1
    - cron: '0 14 * * *'   # 7pm PKT — LinkedIn, Role Set 2
    - cron: '0 17 * * *'   # 10pm PKT — Indeed, Role Set 2
  workflow_dispatch:
    inputs:
      boards:
        description: 'Boards to scrape'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linkedin
          - indeed
          - rozee
          - mustakbil
      role_set:
        description: 'Which role set to use'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - '1'
          - '2'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      REDIS_MAX_RETRIES: ${{ secrets.REDIS_MAX_RETRIES }}
      REDIS_JOB_QUEUE_PREFIX: ${{ secrets.REDIS_JOB_QUEUE_PREFIX }}
      REDIS_PROCESSED_TTL: ${{ secrets.REDIS_PROCESSED_TTL }}
      JOB_SCRAPING_MAX_PAGES_PER_BOARD: ${{ secrets.JOB_SCRAPING_MAX_PAGES_PER_BOARD }}
      JOB_SCRAPING_MAX_JOBS_PER_BOARD: ${{ secrets.JOB_SCRAPING_MAX_JOBS_PER_BOARD }}
      JOB_SCRAPING_DOWNLOAD_DELAY: ${{ secrets.JOB_SCRAPING_DOWNLOAD_DELAY }}
      JOB_STALE_AFTER_DAYS: ${{ secrets.JOB_STALE_AFTER_DAYS }}
      JOB_SCRAPING_WORKERS: ${{ secrets.JOB_SCRAPING_WORKERS }}
      PERMITTED_ROLES_1: ${{ secrets.PERMITTED_ROLES_1 }}
      PERMITTED_ROLES_2: ${{ secrets.PERMITTED_ROLES_2 }}
      JOB_SCRAPING_BOARDS: >-
        ${{
          github.event_name == 'workflow_dispatch' && github.event.inputs.boards ||
          github.event.schedule == '0 20 * * *' && 'linkedin' ||
          github.event.schedule == '0 23 * * *' && 'indeed' ||
          github.event.schedule == '0 2 * * *' && 'linkedin' ||
          github.event.schedule == '0 5 * * *' && 'indeed' ||
          github.event.schedule == '0 8 * * *' && 'linkedin' ||
          github.event.schedule == '0 11 * * *' && 'indeed' ||
          github.event.schedule == '0 14 * * *' && 'linkedin' ||
          github.event.schedule == '0 17 * * *' && 'indeed' ||
          'all'
        }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Resolve role set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ROLE_SET="${{ github.event.inputs.role_set }}"
          elif [ "${{ github.event.schedule }}" = "0 20 * * *" ] || \
               [ "${{ github.event.schedule }}" = "0 23 * * *" ] || \
               [ "${{ github.event.schedule }}" = "0 8 * * *" ] || \
               [ "${{ github.event.schedule }}" = "0 11 * * *" ]; then
            ROLE_SET="1"
          elif [ "${{ github.event.schedule }}" = "0 2 * * *" ] || \
               [ "${{ github.event.schedule }}" = "0 5 * * *" ] || \
               [ "${{ github.event.schedule }}" = "0 14 * * *" ] || \
               [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
            ROLE_SET="2"
          else
            ROLE_SET="all"
          fi

          if [ "$ROLE_SET" = "1" ]; then
            echo "PERMITTED_ROLES=$PERMITTED_ROLES_1" >> $GITHUB_ENV
          elif [ "$ROLE_SET" = "2" ]; then
            echo "PERMITTED_ROLES=$PERMITTED_ROLES_2" >> $GITHUB_ENV
          else
            python3 -c "
          import json, os
          r1 = json.loads(os.environ.get('PERMITTED_ROLES_1', '[]'))
          r2 = json.loads(os.environ.get('PERMITTED_ROLES_2', '[]'))
          merged = list(dict.fromkeys(r1 + r2))
          print('PERMITTED_ROLES=' + json.dumps(merged))
          " >> $GITHUB_ENV
          fi

      - name: Run scraper
        run: uv run python main.py
