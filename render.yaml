services:
  - type: web
    name: devlens-job-scraper
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen && uv run playwright install --with-deps chromium
    startCommand: uv run uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SCRAPER_REDIS_URL
        sync: false
      - key: SCRAPER_TRIGGER_LOCK_TTL_SECONDS
        value: "43200"
      - key: JOB_SCRAPING_BOARDS
        value: linkedin,indeed,rozee,mustakbil
      - key: JOB_SCRAPING_MAX_PAGES_PER_BOARD
        value: "1"
      - key: JOB_SCRAPING_MAX_JOBS_PER_BOARD
        value: "15"
      - key: JOB_SCRAPING_DOWNLOAD_DELAY
        value: "2.0"
      - key: JOB_SCRAPING_FETCH_TIMEOUT_MS
        value: "60000"
      - key: JOB_SCRAPING_WORKERS
        value: "2"
